<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学习资源管理系统</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑";
        }
        /* 蓝色页面背景 还原原版 */
        body{
            background: #1E88E5;
        }
        /* 顶部标题 */
        .header{
            text-align: center;
            color: white;
            padding: 30px 0;
            font-size: 28px;
            font-weight: bold;
        }
        /* 四个模块容器 */
        .container{
            width: 900px;
            margin: 50px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 30px;
        }
        /* 模块样式 蓝色底+白色文字 可点击跳转 */
        .item{
            width: 380px;
            height: 180px;
            background: white;
            color: #1E88E5;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .item:hover{
            transform: translateY(-5px);
            background: #f0f7ff;
        }
    </style>
</head>
<body>
    <div class="header">学习资源管理系统</div>
    <div class="container">
        <!-- 四个原版模块 可点击跳转 -->
        <div class="item" onclick="location.href='index.html'">首页</div>
        <div class="item" onclick="location.href='list.html'">资源列表</div>
        <div class="item" onclick="location.href='upload.html'">上传资源</div>
        <div class="item" onclick="location.href='user.html'">个人中心</div>
    </div>
</body>
</html>
