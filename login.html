<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号登录 - 学习资源管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: url('https://picsum.photos/id/20/1920/1080') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 半透明遮罩层，让背景图片柔和一些，同时保证文字可读性 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        /* 登录卡片容器 */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 460px;
            max-width: 90%;
            padding: 45px 40px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s;
        }

        .login-wrapper:hover {
            transform: translateY(-5px);
        }

        /* 系统标题 */
        .system-title {
            text-align: center;
            margin-bottom: 25px;
            color: #1E88E5;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .system-title i {
            font-size: 32px;
        }

        /* 登录标题 */
        .login-header {
            text-align: center;
            margin-bottom: 35px;
            color: #333;
            font-size: 26px;
            font-weight: 600;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
        }

        /* 输入框区域 */
        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 500;
            font-size: 15px;
        }

        .input-group input {
            width: 100%;
            height: 50px;
            padding: 0 18px;
            border: 1.5px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.9);
        }

        .input-group input:focus {
            border-color: #1E88E5;
            box-shadow: 0 0 0 4px rgba(30, 136, 229, 0.15);
            background: #fff;
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            height: 52px;
            background: #1E88E5;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            box-shadow: 0 8px 16px rgba(30, 136, 229, 0.3);
        }

        .login-btn:hover {
            background: #1565C0;
            transform: scale(1.02);
            box-shadow: 0 12px 20px rgba(30, 136, 229, 0.4);
        }

        /* 提示信息 */
        .hint {
            text-align: center;
            margin-top: 20px;
            color: #777;
            font-size: 14px;
        }

        .hint span {
            color: #1E88E5;
            font-weight: bold;
        }

        /* 底部装饰 */
        .footer-note {
            text-align: center;
            margin-top: 25px;
            color: #aaa;
            font-size: 12px;
        }

        /* 响应式适配 */
        @media (max-width: 500px) {
            .login-wrapper {
                padding: 30px 25px;
            }
            .system-title {
                font-size: 24px;
            }
            .login-header {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <!-- 系统名称 -->
        <div class="system-title">
            <span>📚 学习资源管理系统</span>
        </div>

        <!-- 账号登录标题 -->
        <div class="login-header">
            账号登录
        </div>

        <!-- 登录表单 -->
        <div class="input-group">
            <label>👤 账号</label>
            <input type="text" id="username" placeholder="请输入账号" value="admin">
        </div>
        <div class="input-group">
            <label>🔒 密码</label>
            <input type="password" id="password" placeholder="请输入密码" value="admin">
        </div>

        <button class="login-btn" onclick="login()">登 录</button>

        <!-- 提示信息（演示用） -->
        <div class="hint">
            演示账号：<span>admin</span> &nbsp; 密码：<span>admin</span>
        </div>
        <div class="footer-note">
            —— 开启你的学习之旅 ——
        </div>
    </div>

    <script>
        function login() {
            let user = document.getElementById('username').value.trim();
            let pwd = document.getElementById('password').value;

            if(user === 'admin' && pwd === 'admin'){
                // 登录成功跳转到首页（home.html）
                window.location.href = 'home.html';
            }else{
                alert('❌ 账号或密码错误！');
            }
        }

        // 监听回车键登录
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>

</body>
</html>
