<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh;}
        .login-box{width:350px;padding:40px;background:white;border-radius:10px;box-shadow:0 0 10px #ccc;}
        .login-box h2{text-align:center;margin-bottom:30px;color:#333;}
        .input-box{margin-bottom:20px;}
        .input-box input{width:100%;height:40px;padding:0 10px;border:1px solid #ccc;border-radius:5px;outline:none;}
        button{width:100%;height:45px;background:#007bff;color:white;border:none;border-radius:5px;font-size:16px;cursor:pointer;}
        button:hover{background:#0056b3;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>用户登录</h2>
        <div class="input-box">
            <input type="text" id="username" placeholder="账号">
        </div>
        <div class="input-box">
            <input type="password" id="password" placeholder="密码">
        </div>
        <button onclick="login()">登录</button>
    </div>

    <script>
        function login() {
            // 账号密码：admin / admin
            let user = document.getElementById('username').value;
            let pwd = document.getElementById('password').value;
            
            if(user === 'admin' && pwd === 'admin'){
                // 修复线上弹回问题，保留所有原有功能
                window.location.replace('index.html');
            }else{
                alert('账号或密码错误！');
            }
        }
    </script>
</body>
</html>
