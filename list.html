<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>资源列表</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
        }
        body{
            background:#f5f7fa;
        }
        .nav{
            background:#007bff;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .nav a{
            color:white;
            margin-left:20px;
            text-decoration:none;
        }
        .container{
            max-width:1000px;
            margin:30px auto;
            padding:0 20px;
        }
        .search-box{
            margin-bottom:30px;
            display:flex;
            gap:10px;
        }
        #search{
            flex:1;
            padding:12px 18px;
            border:1px solid #ddd;
            border-radius:30px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }
        #search:focus{
            border-color:#007bff;
            box-shadow:0 0 0 3px rgba(0,123,255,0.1);
        }
        .search-btn{
            padding:12px 25px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:30px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }
        .search-btn:hover{
            background:#0056b3;
        }

        /* ========= 资源卡片（放大、居中） ========= */
        .item{
            background:white;
            padding:20px 25px;
            border-radius:16px;
            margin-bottom:18px;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
            display:flex;
            justify-content:space-between;
            align-items:center;
            transition:0.2s;
            border:1px solid #f0f0f0;
        }
        .item:hover{
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
            transform:translateY(-2px);
        }
        .item-info h4{
            color:#1E88E5;
            margin-bottom:8px;
            font-size:20px;
        }
        .item-info p{
            color:#666;
            font-size:15px;
        }
        .item-actions{
            display:flex;
            gap:10px;
        }
        .collect{
            padding:8px 18px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:30px;
            cursor:pointer;
            font-size:15px;
            transition:0.2s;
        }
        .collect:hover{
            background:#218838;
        }
        .link-btn{
            padding:8px 18px;
            background:#17a2b8;
            color:white;
            border:none;
            border-radius:30px;
            cursor:pointer;
            font-size:15px;
            transition:0.2s;
        }
        .link-btn:hover{
            background:#138496;
        }

        /* ========= 分页控件 ========= */
        .pagination{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:12px;
            margin-top:40px;
            flex-wrap:wrap;
        }
        .page-btn{
            min-width:42px;
            height:42px;
            padding:0 12px;
            background:white;
            border:1px solid #ddd;
            border-radius:30px;
            color:#333;
            font-size:16px;
            cursor:pointer;
            transition:0.2s;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .page-btn:hover{
            background:#f0f0f0;
        }
        .page-btn.active{
            background:#007bff;
            color:white;
            border-color:#007bff;
        }
        .page-btn.disabled{
            opacity:0.5;
            cursor:not-allowed;
        }
        .page-info{
            color:#666;
            font-size:15px;
            margin:0 10px;
        }
        .empty-msg{
            text-align:center;
            padding:60px 0;
            color:#999;
            font-size:18px;
        }
    </style>
</head>
<body>
    <div class="nav">
        <h2>📚 计科学习资源管理系统</h2>
        <div>
            <a href="home.html">首页</a>
            <a href="list.html">资源列表</a>
            <a href="upload.html">上传资源</a>
            <a href="user.html">个人中心</a>
        </div>
    </div>

    <div class="container">
        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 搜索资源名称或类型">
            <button class="search-btn" onclick="search()">搜索</button>
        </div>

        <div id="list-box"></div>
        <div id="pagination-box" class="pagination"></div>
    </div>

    <script>
        // 资源数据（共18个，保持不变）
        let resData = [
            {name:"C语言入门教程", type:"编程语言", desc:"基础语法+课后习题", link:"https://www.bilibili.com/video/BV17iDaB1EkB/?spm_id_from=333.337.search-card.all.click&vd_source=0e4249f450cf489abf1e363cfe6c59d4"},
            {name:"数据结构", type:"数据结构", desc:"B站精讲全套", link:"https://www.bilibili.com/video/BV1tNpbekEht/?spm_id_from=333.337.search-card.all.click&vd_source=0e4249f450cf489abf1e363cfe6c59d4"},
            {name:"计算机网络思维导图", type:"计算机网络", desc:"七层模型+协议", link:"https://img-blog.csdnimg.cn/20201211151744882.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3dlaXhpbl80NTQwNjE1NQ==,size_16,color_FFFFFF,t_70"},
            {name:"操作系统", type:"操作系统", desc:"真题+答案", link:"https://www.bilibili.com/video/BV167Awz8EjP/?spm_id_from=333.337.search-card.all.click&vd_source=0e4249f450cf489abf1e363cfe6c59d4/"},
            {name:"Python核心编程", type:"编程语言", desc:"第三版中文版", link:"https://www.bilibili.com/video/BV1sHU9BmEne/?spm_id_from=333.337.search-card.all.click&vd_source=0e4249f450cf489abf1e363cfe6c59d4"},
            {name:"Java从入门到精通", type:"编程语言", desc:"包含源码", link:"https://weread.qq.com/web/reader/9de32da0813ab8188g01235ak16732dc0161679091c5aeb1"},
            {name:"LeetCode刷题笔记", type:"算法", desc:"分类题解200道", link:"https://blog.csdn.net/gitblog_01412/article/details/150056483"},
            {name:"MySQL必知必会", type:"数据库", desc:"SQL基础与优化", link:"https://blog.csdn.net/EPFL_Panda/article/details/100579485"},
            {name:"计算机组成原理课件", type:"硬件基础", desc:"唐朔飞版配套", link:"https://www.openke.net/ppt/430/index.html"},
            {name:"深入理解计算机系统", type:"系统", desc:"CSAPP经典教材", link:"https://www.bilibili.com/video/BV1RK4y1R7Kf/?spm_id_from=333.337.search-card.all.click"},
            {name:"前端开发入门合集", type:"Web开发", desc:"HTML/CSS/JS", link:"https://www.bilibili.com/video/BV1MvaVzUEuz/?spm_id_from=333.337.search-card.all.click&vd_source=0e4249f450cf489abf1e363cfe6c59d4"},
            {name:"Linux命令速查表", type:"操作系统", desc:"常用命令大全", link:"https://img-blog.csdnimg.cn/img_convert/e92072d3b52a8dc69b44b29e3aea1968.png"},
            {name:"Git版本控制指南", type:"开发工具", desc:"从入门到协作", link:"https://blog.csdn.net/2302_80871796/article/details/149141444"},
            {name:"设计模式精解", type:"软件工程", desc:"23种设计模式", link:"https://www.bilibili.com/video/BV1Yr4y157Ci/?spm_id_from=333.337.search-card.all.click&vd_source=0e4249f450cf489abf1e363cfe6c59d4"},
            {name:"人工智能导论", type:"AI", desc:"机器学习基础", link:"https://www.tup.tsinghua.edu.cn/upload/books/yz/112436-01.pdf"},
            {name:"编译原理课程设计", type:"编译技术", desc:"词法语法分析", link:"https://csguide.cn/roadmap/basic/compiler.html"},
            {name:"计算机网络自顶向下", type:"计算机网络", desc:"经典教材第七版", link:"https://gaia.cs.umass.edu/kurose_ross/ppt.php"},
            {name:"软件测试方法与实践", type:"测试", desc:"自动化测试入门", link:"https://www.bilibili.com/video/BV1TP4y1J7BD/?spm_id_from=333.337.search-card.all.click&vd_source=0e4249f450cf489abf1e363cfe6c59d4"}
        ];

        const pageSize = 5;                 // 每页显示5条
        let currentPage = 1;               // 当前页码
        let currentData = resData;         // 当前展示的数据（搜索结果或全部）

        // 初始化
        window.onload = function() {
            renderPage();
        };

        // 渲染当前页
        function renderPage() {
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = currentData.slice(start, end);
            
            // 渲染列表
            let html = '';
            if (pageData.length === 0) {
                html = '<div class="empty-msg">📭 没有找到相关资源</div>';
            } else {
                pageData.forEach(item => {
                    html += `
                    <div class="item">
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <p>${item.type} ｜ ${item.desc}</p>
                        </div>
                        <div class="item-actions">
                            <button class="collect" onclick="collect('${item.name}')">⭐ 收藏</button>
                            <button class="link-btn" onclick="window.open('${item.link}','_blank')">🔗 查看</button>
                        </div>
                    </div>
                    `;
                });
            }
            document.getElementById('list-box').innerHTML = html;
            
            // 渲染分页控件
            renderPagination();
        }

        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(currentData.length / pageSize);
            const paginationBox = document.getElementById('pagination-box');
            
            if (totalPages <= 1) {
                paginationBox.innerHTML = '';
                return;
            }

            let paginationHtml = '';
            
            // 上一页
            if (currentPage > 1) {
                paginationHtml += `<button class="page-btn" onclick="goToPage(${currentPage - 1})">‹ 上一页</button>`;
            } else {
                paginationHtml += `<button class="page-btn disabled" disabled>‹ 上一页</button>`;
            }

            // 页码
            const maxVisible = 5; // 最多显示5个页码
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }

            if (startPage > 1) {
                paginationHtml += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
                if (startPage > 2) {
                    paginationHtml += `<span style="padding:0 5px;">…</span>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    paginationHtml += `<button class="page-btn active">${i}</button>`;
                } else {
                    paginationHtml += `<button class="page-btn" onclick="goToPage(${i})">${i}</button>`;
                }
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    paginationHtml += `<span style="padding:0 5px;">…</span>`;
                }
                paginationHtml += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }

            // 下一页
            if (currentPage < totalPages) {
                paginationHtml += `<button class="page-btn" onclick="goToPage(${currentPage + 1})">下一页 ›</button>`;
            } else {
                paginationHtml += `<button class="page-btn disabled" disabled>下一页 ›</button>`;
            }

            // 页码信息
            paginationHtml += `<span class="page-info">第 ${currentPage} / ${totalPages} 页 (共 ${currentData.length} 条)</span>`;
            
            paginationBox.innerHTML = paginationHtml;
        }

        // 跳转页面
        function goToPage(page) {
            const totalPages = Math.ceil(currentData.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderPage();
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 搜索功能（保留原有逻辑，重置为第一页）
        function search() {
            let key = document.getElementById('search').value.trim().toLowerCase();
            if (!key) {
                currentData = resData;
            } else {
                currentData = resData.filter(item => 
                    item.name.toLowerCase().includes(key) || 
                    item.type.toLowerCase().includes(key)
                );
            }
            currentPage = 1;  // 重置到第一页
            renderPage();
        }

        // 收藏功能（完全保留）
        function collect(name) {
            let collects = JSON.parse(localStorage.getItem("collects") || "[]");
            if (!collects.includes(name)) {
                collects.push(name);
                localStorage.setItem("collects", JSON.stringify(collects));
                alert("收藏成功！");
            } else {
                alert("已收藏过！");
            }
        }
    </script>
</body>
</html>
